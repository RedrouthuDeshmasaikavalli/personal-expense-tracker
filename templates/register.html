<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-4 mt-5">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        📝 Create Account
                    </h2>

                    <form method="POST">

                        <!-- Username -->
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control" placeholder="Username" required>
                        </div>

                        <!-- Password with eye button -->
                        <div class="mb-3 position-relative">

                            <input
                                type="password"
                                name="password"
                                id="reg_password"
                                class="form-control"
                                placeholder="Password"
                                required>

                            <span onclick="toggleRegisterPassword()"
                                  style="position:absolute; right:10px; top:8px; cursor:pointer;">
                                👁️
                            </span>

                        </div>

                        <!-- Secret Question 1 -->
                        <div class="mb-3">
                            <input type="text" name="secret1" class="form-control" placeholder="First mobile brand?" required>
                        </div>

                        <!-- Secret Question 2 -->
                        <div class="mb-3">
                            <input type="text" name="secret2" class="form-control" placeholder="Favourite teacher name?" required>
                        </div>

                        <!-- Button -->
                        <button type="submit" class="btn btn-success w-100">
                            Register
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/login">
                            Already have an account?
                        </a>
                    </div>

                    {% if msg %}
                    <div class="alert alert-danger mt-3">
                        {{ msg }}
                    </div>
                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</div>

<!-- JS for toggle password -->
<script>
function toggleRegisterPassword() {
    let pwd = document.getElementById("reg_password");

    if (pwd.type === "password") {
        pwd.type = "text";
    } else {
        pwd.type = "password";
    }
}
</script>

</body>
</html>
